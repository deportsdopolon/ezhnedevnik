<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ежедневник">
  <meta name="theme-color" content="#f7f7f5">
  <title>Ежедневник</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <button id="prevWeek" class="icon-btn" aria-label="Прошлая неделя">‹</button>
      <div class="top-center">
        <div id="monthTitle" class="month-title"></div>
        <div id="weekTitle" class="week-title"></div>
      </div>
      <button id="nextWeek" class="icon-btn" aria-label="Следующая неделя">›</button>
      <button id="todayBtn" class="pill-btn">Сегодня</button>
    </header>

    <main id="weekGrid" class="week-grid"></main>

    <section class="mini-calendar-wrap">
      <div id="miniCalendar" class="mini-calendar"></div>
    </section>
  </div>

  <dialog id="entryDialog" class="entry-dialog">
    <form method="dialog" id="entryForm">
      <h2 id="dialogTitle">Запись</h2>

      <label class="field">
        <span>Заметка</span>
        <textarea id="entryText" rows="3" placeholder="Что запланировано?"></textarea>
      </label>

      <div class="contact-block">
        <label class="field">
          <span>Контакт</span>
          <input id="contactName" type="text" placeholder="Имя" autocomplete="name">
        </label>
        <label class="field">
          <span>Телефон</span>
          <input id="contactPhone" type="tel" placeholder="+7 ..." autocomplete="tel">
        </label>
        <button type="button" id="pickContactBtn" class="secondary-btn">Выбрать из контактов</button>
      </div>

      <div class="dialog-actions">
        <button type="button" id="deleteEntryBtn" class="danger-btn">Удалить</button>
        <button type="button" id="cancelBtn" class="secondary-btn">Отмена</button>
        <button type="submit" class="primary-btn">Сохранить</button>
      </div>
    </form>
  </dialog>

  <div id="installHint" class="install-hint hidden">
    <p>Чтобы сделать приложение на экране iPhone: нажмите <strong>Поделиться</strong> → <strong>На экран «Домой»</strong></p>
    <button id="dismissHint" class="secondary-btn">Понятно</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
