<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ежедневник">
  <meta name="theme-color" content="#f7f7f5">
  <title>Ежедневник</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" data-mode="day">
    <header class="top-bar">
      <button id="prevBtn" class="icon-btn" aria-label="Назад">‹</button>
      <div class="top-center">
        <div id="monthTitle" class="month-title"></div>
        <div id="dayTitle" class="day-title"></div>
      </div>
      <button id="nextBtn" class="icon-btn" aria-label="Вперёд">›</button>
    </header>

    <div id="dayView" class="day-view">
      <div id="dayHeader" class="day-header-card"></div>
      <div id="hoursList" class="hours-list"></div>
    </div>

    <div id="weekView" class="week-view hidden">
      <div class="week-hint">Сведите пальцы — один день · Разведите — вся неделя</div>
      <div id="weekGrid" class="week-overview"></div>
    </div>
  </div>

  <dialog id="contactDialog" class="sheet-dialog">
    <div class="sheet-content">
      <h2 id="contactDialogTitle">Клиент</h2>
      <button type="button" id="pickContactBtn" class="primary-btn full-width">Выбрать из контактов</button>
      <label class="field">
        <span>Имя</span>
        <input id="manualName" type="text" placeholder="Имя клиента" autocomplete="name">
      </label>
      <label class="field">
        <span>Телефон</span>
        <input id="manualPhone" type="tel" placeholder="+7 ..." autocomplete="tel">
      </label>
      <div class="dialog-actions">
        <button type="button" id="clearContactBtn" class="danger-btn">Очистить</button>
        <button type="button" id="cancelContactBtn" class="secondary-btn">Отмена</button>
        <button type="button" id="saveContactBtn" class="primary-btn">Сохранить</button>
      </div>
    </div>
  </dialog>

  <div id="installHint" class="install-hint hidden">
    <p>Safari → <strong>Поделиться</strong> → <strong>На экран «Домой»</strong></p>
    <button id="dismissHint" class="secondary-btn">Понятно</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
