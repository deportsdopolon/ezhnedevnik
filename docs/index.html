<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ежедневник">
  <meta name="theme-color" content="#f7f7f5">
  <title>Ежедневник</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" data-mode="day">
    <header class="top-bar">
      <button id="prevBtn" class="icon-btn" aria-label="Предыдущий день">‹</button>
      <div class="top-center">
        <div id="monthTitle" class="month-title"></div>
        <div id="dayTitle" class="day-title"></div>
      </div>
      <button id="nextBtn" class="icon-btn" aria-label="Следующий день">›</button>
    </header>

    <div id="dayView" class="day-view">
      <div id="dayHeader" class="day-header-card"></div>
      <div id="hoursList" class="hours-list"></div>
    </div>

    <div id="weekView" class="week-view hidden">
      <div class="week-hint">Сведите 2 пальца — вся неделя · Нажмите на день — открыть</div>
      <div id="weekGrid" class="week-overview"></div>
    </div>
  </div>

  <div id="installHint" class="install-hint hidden">
    <p>Safari → <strong>Поделиться</strong> → <strong>На экран «Домой»</strong></p>
    <button id="dismissHint" class="secondary-btn">Понятно</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
